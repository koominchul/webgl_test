<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Constellation_AR_Dev</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1920 height=1200 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Constellation_AR_Dev</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/UnityWebBuild.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/UnityWebBuild.data.unityweb",
        frameworkUrl: buildUrl + "/UnityWebBuild.framework.js.unityweb",
        codeUrl: buildUrl + "/UnityWebBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "minigate",
        productName: "Constellation_AR_Dev",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // ── 전자칠판/고해상도 호환: 렌더 해상도(백버퍼) 제한으로 "검은 화면"과 "프레임 저하"를 동시에 방지.
      //    핵심: FPS는 물리 화면 크기가 아니라 백버퍼 픽셀 수(= CSS크기 x devicePixelRatio)에 비례한다.
      //    4K 전자칠판에서 화면을 채우면 백버퍼가 데스크톱(1920x1200) 대비 4배 이상 커져 프레임이 떨어지고,
      //    1920 x DPR 이 GPU의 MAX_TEXTURE_SIZE(4096)를 넘으면 컨텍스트 실패로 검은 화면까지 발생한다.
      //    -> 화면은 CSS로 꽉 채우되(브라우저가 업스케일, GPU 부하 없음), 실제 렌더 폭만 TARGET_W로 고정한다.
      //       이렇게 하면 물리 해상도와 무관하게 데스크톱 수준의 프레임이 유지된다. (대가: 약간의 업스케일 blur)
      config.devicePixelRatio = (function () {
        var TARGET_W = 1920;   // 목표 렌더 가로 해상도. 더 선명하게 원하면 2560 등으로 올릴 것(프레임과 트레이드오프)
        var MAX_DIM  = 4096;   // GPU MAX_TEXTURE_SIZE 안전 상한(검은 화면 방지)
        var dpr = window.devicePixelRatio || 1;
        var cssW = window.innerWidth || TARGET_W;   // 캔버스가 채우는 CSS 가로 폭(모바일 채움 모드 기준)
        // 백버퍼 가로(cssW x dpr)가 TARGET_W를 넘지 않도록 DPR 상한을 건다.
        var cap = Math.min(TARGET_W, MAX_DIM) / cssW;
        return Math.max(0.1, Math.min(dpr, cap));   // 네이티브 DPR 이상으로는 올리지 않음(업스케일만)
      })();

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "1920px";
        canvas.style.height = "1200px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          window.unityInstance = unityInstance;   // ★ 전역 노출 (테스트 버튼용)
          document.querySelector("#unity-loading-bar").style.display = "none";

          // ★ 네이티브 전체화면(canvas만 fullscreen) 대신 CSS 유사 전체화면 사용.
          //    -> 이렇게 해야 DOM 테스트 버튼이 전체화면에서도 위에 보임.
          var container = document.querySelector("#unity-container");
          var footer = document.querySelector("#unity-footer");
          var pseudoFs = false;
          function togglePseudoFullscreen() {
            pseudoFs = !pseudoFs;
            if (pseudoFs) {
              container.style.position = "fixed";
              container.style.left = "0";
              container.style.top = "0";
              container.style.transform = "none";   // ★ CSS의 translate(-50%,-50%) 무력화
              container.style.width = "100vw";
              container.style.height = "100vh";
              container.style.zIndex = "1000";
              container.style.background = "#000";
              if (footer) footer.style.display = "none";   // ★ footer 제거(스크롤 방지)
              document.body.style.overflow = "hidden";
              canvas.style.width = "100vw";
              canvas.style.height = "100vh";
            } else {
              container.style.position = "";
              container.style.left = "";
              container.style.top = "";
              container.style.transform = "";
              container.style.width = "";
              container.style.height = "";
              container.style.zIndex = "";
              container.style.background = "";
              if (footer) footer.style.display = "";
              document.body.style.overflow = "";
              canvas.style.width = "1920px";
              canvas.style.height = "1200px";
            }
          }
          document.querySelector("#unity-fullscreen-button").onclick = togglePseudoFullscreen;
          // ※ Escape로 유사 전체화면을 해제하지 않는다.
          //   (OS 전체화면을 Escape로 나갈 때 창까지 쪼그라드는 것을 방지 — 기본은 항상 꽉 채움 유지)

          // ★ 기본 실행 시 자동으로 유사 전체화면(브라우저 창 꽉 채움) 진입
          togglePseudoFullscreen();

          // ★ (선택) 첫 사용자 터치/클릭 때 "진짜 OS 전체화면"으로 승격.
          //    브라우저는 사용자 제스처가 있어야 requestFullscreen 을 허용한다.
          function goNativeFullscreenOnce() {
            var el = document.documentElement;
            var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
            if (req) { try { req.call(el); } catch (e) {} }
            window.removeEventListener("pointerdown", goNativeFullscreenOnce);
          }
          window.addEventListener("pointerdown", goNativeFullscreenOnce);

        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

    </script>
